<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>弁当予約</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 420px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    h2 { margin: 0 0 10px; }
    .note {
      color: #666;
      font-size: 13px;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    label {
      font-size: 14px;
      display: block;
      margin-top: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-sizing: border-box;
    }
    .qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty button {
      width: 56px;
      height: 48px;
      font-size: 20px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #fafafa;
      cursor: pointer;
    }
    .qty input { text-align: center; }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      font-size: 18px;
      border: none;
      color: #fff;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn.reserve { background: #2b5cff; }
    .btn.cancel  { background: #ff3b30; }

    .message {
      margin-top: 14px;
      font-size: 14px;
      word-break: break-word;
    }

    .disabled {
      opacity: .65;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>弁当予約</h2>
    <div class="note">
      ※ 当日9:00締切／過去日不可／重複予約不可（同じ名前＋同じ日付）<br/>
      ※ 予約・キャンセルの結果は画面に表示されます
    </div>

    <label>名前</label>
    <input id="name" placeholder="例：山田 太郎" />

    <label>予約日</label>
    <input type="date" id="date" />

    <label>数量</label>
    <div class="qty">
      <button type="button" onclick="changeQty(-1)">−</button>
      <input id="qty" value="1" inputmode="numeric" />
      <button type="button" onclick="changeQty(1)">＋</button>
    </div>

    <label>備考（任意）</label>
    <input id="comment" placeholder="例：ご飯少なめ" />

    <div class="row">
      <button class="btn reserve" id="btnReserve" onclick="reserve()">予約する</button>
      <button class="btn cancel"  id="btnCancel"  onclick="cancel()">キャンセル</button>
    </div>

    <div id="message" class="message"></div>
  </div>

  <script>
    // 初期日付（今日）＋過去日選択不可（UI）
    const today = new Date().toISOString().split("T")[0];
    const dateInput = document.getElementById("date");
    dateInput.value = today;
    dateInput.min = today;

    // 名前記憶
    const savedName = localStorage.getItem("userName");
    if (savedName) document.getElementById("name").value = savedName;

    function showMessage(msg, color="black") {
      const el = document.getElementById("message");
      el.innerText = msg;
      el.style.color = color;
    }

    function setBusy(isBusy) {
      const r = document.getElementById("btnReserve");
      const c = document.getElementById("btnCancel");
      r.disabled = isBusy;
      c.disabled = isBusy;
      r.classList.toggle("disabled", isBusy);
      c.classList.toggle("disabled", isBusy);
      r.textContent = isBusy ? "送信中..." : "予約する";
      c.textContent = isBusy ? "送信中..." : "キャンセル";
    }

    function changeQty(delta) {
      let qty = parseInt(document.getElementById("qty").value, 10);
      if (isNaN(qty)) qty = 1;
      qty += delta;
      if (qty < 1) qty = 1;
      document.getElementById("qty").value = qty;
    }

    function getPayload() {
      const name = document.getElementById("name").value.trim();
      const date = document.getElementById("date").value;
      const quantity = document.getElementById("qty").value;
      const comment = document.getElementById("comment").value;

      if (!name) {
        showMessage("名前を入力してください", "red");
        return null;
      }

      localStorage.setItem("userName", name);
      return { name, date, quantity, comment };
    }

    function reserve() {
      const payload = getPayload();
      if (!payload) return;

      setBusy(true);
      showMessage("送信中...");

      google.script.run
        .withSuccessHandler(res => {
          if (res.status === "OK") {
            showMessage("✅ " + res.message, "green");
            document.getElementById("qty").value = 1;
            document.getElementById("comment").value = "";
          } else {
            showMessage("❌ " + res.message, "red");
          }
          setBusy(false);
        })
        .withFailureHandler(err => {
          showMessage("❌ 通信エラー: " + err.message, "red");
          setBusy(false);
        })
        .reserveOrder(payload);
    }

    function cancel() {
      const payload = getPayload();
      if (!payload) return;

      if (!confirm("本当にキャンセルしますか？\n（同じ名前＋日付の予約を削除します）")) return;

      setBusy(true);
      showMessage("キャンセル送信中...");

      google.script.run
        .withSuccessHandler(res => {
          if (res.status === "OK") {
            showMessage("✅ " + res.message, "blue");
          } else {
            showMessage("❌ " + res.message, "red");
          }
          setBusy(false);
        })
        .withFailureHandler(err => {
          showMessage("❌ 通信エラー: " + err.message, "red");
          setBusy(false);
        })
        .cancelOrder(payload);
    }
  </script>
</body>
</html>
