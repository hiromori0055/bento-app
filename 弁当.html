<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>弁当予約</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

h2 {
  margin-bottom: 10px;
}

label {
  font-size: 14px;
  display: block;
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  font-size: 16px;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  font-size: 18px;
  border: none;
  color: white;
  border-radius: 8px;
  background: #2b5cff;
}

.message {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
  <h2>弁当予約</h2>

  <label>名前</label>
  <input id="name" placeholder="例：山田 太郎">

  <label>予約日</label>
  <input type="date" id="date">

  <label>数量</label>
  <input id="qty" value="1">

  <button class="btn" onclick="submitForm()">予約する</button>

  <div id="message" class="message"></div>
</div>

<script>

// ✅ 最新 Apps Script URL
const API_URL = "https://script.google.com/macros/s/AKfycbxouPnlU8TK0ok6O0xx99vRVBRw0DXJDkoS4og_VdDvUeSpaiR17u7GrahMaQHs8cGw/exec";

// 初期日付
document.getElementById("date").value =
  new Date().toISOString().split("T")[0];

// メッセージ表示
function showMessage(msg, color="black") {
  const el = document.getElementById("message");
  el.innerText = msg;
  el.style.color = color;
}

// 送信処理
function submitForm() {
  const name = document.getElementById("name").value.trim();
  const date = document.getElementById("date").value;
  const qty = document.getElementById("qty").value;

  if (!name) {
    showMessage("名前を入力してください", "red");
    return;
  }

  const data = {
    name: name,
    date: date,
    quantity: qty,
    comment: ""
  };

  showMessage("送信中...");

  fetch(API_URL, {
    method: "POST",
    mode: "no-cors",   // ✅ CORS回避（超重要）
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(() => {
    showMessage("✅ 予約を送信しました（反映を確認してください）", "green");

    // 入力リセット（任意）
    document.getElementById("qty").value = 1;
  })
  .catch(err => {
    console.error(err);
    showMessage("❌ 通信エラー: " + err, "red");
  });
}

</script>

</body>
</html>
