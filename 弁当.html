<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>弁当予約</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

h2 {
  margin-bottom: 10px;
}

.note {
  color: #666;
  font-size: 13px;
  margin-bottom: 10px;
}

label {
  font-size: 14px;
  display: block;
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  font-size: 16px;
}

.qty {
  display: flex;
  align-items: center;
}

.qty button {
  width: 60px;
  height: 50px;
  font-size: 20px;
}

.qty input {
  text-align: center;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  font-size: 18px;
  border: none;
  color: white;
  border-radius: 8px;
}

.reserve {
  background: #2b5cff;
}

.cancel {
  background: #ff3b30;
}

.message {
  margin-top: 15px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <h2>弁当予約</h2>

  <div class="note">※ 当日9:00締切 / 過去日は予約不可</div>

  <label>名前</label>
  <input id="name" placeholder="例：山田 太郎">

  <label>予約日</label>
  <input type="date" id="date">

  <label>数量</label>
  <div class="qty">
    <button onclick="changeQty(-1)">−</button>
    <input id="qty" value="1">
    <button onclick="changeQty(1)">＋</button>
  </div>

  <label>備考</label>
  <input id="comment">

  <button class="btn reserve" onclick="submitForm()">予約する</button>
  <button class="btn cancel" onclick="cancelOrder()">キャンセル</button>

  <div id="message" class="message"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwXd3pxDgSNggXirCi1CBe95PKTPalZvBpw6rat-587YfqhWw8pmC0EnoNTpv2QA1JnQw/exec";

// ===== 初期設定 =====
const today = new Date().toISOString().split("T")[0];

const dateInput = document.getElementById("date");
dateInput.value = today;
dateInput.min = today;

// 名前記憶
const savedName = localStorage.getItem("userName");
if (savedName) {
  document.getElementById("name").value = savedName;
}

// ===== 数量 =====
function changeQty(n) {
  let qty = parseInt(document.getElementById("qty").value) || 1;
  qty += n;
  if (qty < 1) qty = 1;
  document.getElementById("qty").value = qty;
}

// ===== メッセージ表示 =====
function showMessage(msg, color="black") {
  const el = document.getElementById("message");
  el.innerText = msg;
  el.style.color = color;
}

// ===== データ取得 =====
function getData() {
  const name = document.getElementById("name").value.trim();
  const date = document.getElementById("date").value;

  if (!name) {
    showMessage("名前を入力してください", "red");
    return null;
  }

  localStorage.setItem("userName", name);

  return {
    name: name,
    date: date,
    quantity: document.getElementById("qty").value,
    comment: document.getElementById("comment").value
  };
}

// ===== 締切チェック =====
function isAfterDeadline(dateStr) {
  const now = new Date();
  const d = new Date(dateStr);
  d.setHours(9,0,0,0);
  return now > d;
}

// ===== 予約 =====
function submitForm() {
  const data = getData();
  if (!data) return;

  if (isAfterDeadline(data.date)) {
    showMessage("締切（9:00）を過ぎています", "red");
    return;
  }

  showMessage("送信中...");

  fetch(https://script.google.com/macros/s/AKfycbzsjhu8EmizKHdsxV_yM1QHqWwX08IVobIaWiJTGKa3dzKtcpDnzlOgRDxm9X90WcCn/exec, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "OK") {
      showMessage("✅ 予約完了しました", "green");
    } else {
      showMessage(res.message, "red");
    }
  })
  .catch(err => {
    console.error(err);
    showMessage("通信エラー: " + err, "red");
  });
}

// ===== キャンセル =====
function cancelOrder() {
  if (!confirm("本当にキャンセルしますか？")) return;

  const data = getData();
  if (!data) return;

  if (isAfterDeadline(data.date)) {
    showMessage("締切後はキャンセルできません", "red");
    return;
  }

  showMessage("送信中...");

  fetch(https://script.google.com/macros/s/AKfycbzsjhu8EmizKHdsxV_yM1QHqWwX08IVobIaWiJTGKa3dzKtcpDnzlOgRDxm9X90WcCn/exec, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      mode: "cancel",
      name: data.name,
      date: data.date
    })
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "OK") {
      showMessage("✅ キャンセルしました", "blue");
    } else {
      showMessage(res.message, "red");
    }
  })
  .catch(err => {
    console.error(err);
    showMessage("通信エラー: " + err, "red");
  });
}
</script>

</body>
</html>
