<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>弁当予約</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

h2 {
  margin-bottom: 10px;
}

.note {
  color: #666;
  font-size: 13px;
  margin-bottom: 10px;
}

label {
  font-size: 14px;
  display: block;
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  font-size: 16px;
}

.qty {
  display: flex;
  align-items: center;
}

.qty button {
  width: 60px;
  height: 50px;
  font-size: 20px;
}

.qty input {
  text-align: center;
}

.btn {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  font-size: 18px;
  border: none;
  color: white;
  border-radius: 8px;
}

.reserve {
  background: #2b5cff;
}

.cancel {
  background: #ff3b30;
}
</style>
</head>

<body>

<div class="container">
  <h2>弁当予約</h2>

  <div class="note">※ 当日9:00締切 / 過去日は予約不可</div>

  <label>名前</label>
  <input id="name" placeholder="例：山田 太郎">

  <label>予約日</label>
  <input type="date" id="date">

  <label>数量</label>
  <div class="qty">
    <button onclick="changeQty(-1)">−</button>
    <input id="qty" value="1">
    <button onclick="changeQty(1)">＋</button>
  </div>

  <label>備考</label>
  <input id="comment">

  <button class="btn reserve" onclick="submitForm()">予約する</button>
  <button class="btn cancel" onclick="cancelOrder()">キャンセル</button>
</div>

<script>
// ===== 初期設定 =====

const today = new Date().toISOString().split("T")[0];

const dateInput = document.getElementById("date");
dateInput.value = today;
dateInput.min = today; // 過去日不可

// 名前保存
const savedName = localStorage.getItem("userName");
if (savedName) {
  document.getElementById("name").value = savedName;
}

// ===== 数量変更 =====
function changeQty(n) {
  let qty = parseInt(document.getElementById("qty").value) || 1;
  qty += n;
  if (qty < 1) qty = 1;
  document.getElementById("qty").value = qty;
}

// ===== 共通データ取得 =====
function getData() {
  const name = document.getElementById("name").value.trim();
  const date = document.getElementById("date").value;
  const qty = document.getElementById("qty").value;

  if (!name) {
    alert("名前を入力してください");
    return null;
  }

  localStorage.setItem("userName", name);

  return {
    name: name,
    date: date,
    quantity: qty,
    comment: document.getElementById("comment").value
  };
}

// ===== 締切チェック =====
function isAfterDeadline(dateStr) {
  const now = new Date();
  const d = new Date(dateStr);
  d.setHours(9,0,0,0);
  return now > d;
}

// ===== 予約 =====
function submitForm() {
  const data = getData();
  if (!data) return;

  // 締切チェック
  if (isAfterDeadline(data.date)) {
    alert("締切（9:00）を過ぎています");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbwXd3pxDgSNggXirCi1CBe95PKTPalZvBpw6rat-587YfqhWw8pmC0EnoNTpv2QA1JnQw/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify(data)
})

  .then(res => res.json())
  .then(res => alert(res.message))
  .catch(() => alert("エラー"));
}

// ===== キャンセル =====
function cancelOrder() {
  if (!confirm("本当にキャンセルしますか？")) return;

  const data = getData();
  if (!data) return;

  if (isAfterDeadline(data.date)) {
    alert("締切後はキャンセルできません");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbwXd3pxDgSNggXirCi1CBe95PKTPalZvBpw6rat-587YfqhWw8pmC0EnoNTpv2QA1JnQw/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    mode: "cancel",
    name: data.name,
    date: data.date
  })
})
  .then(res => res.json())
  .then(res => alert(res.message))
  .catch(() => alert("エラー"));
}
</script>

</body>
</html>
